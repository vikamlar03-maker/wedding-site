<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #f3f3f3;
}

/* фото */
img {
    width: 100%;
    display: block;
}

/* кнопка play */
.play-btn {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    font-size: 30px;
}

/* обертка */
.block {
    position: relative;
}

/* таймер поверх рук */
.timer {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 26px;
    background: rgba(255,255,255,0.8);
    padding: 10px 20px;
    border-radius: 20px;
}

/* анкета */
.form {
    padding: 30px;
    text-align: center;
}

input, select, button {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
}

/* ссылка */
.link {
    text-align: center;
    padding: 40px;
}
</style>
</head>

<body>

<audio id="music" src="Два незнакомца - LuizA.mp3"></audio>

<!-- первый экран -->
<div class="block">
    <img src="Увімкни для атмосфери - 1.png">

    <div class="play-btn" onclick="startMusic()">
        ▶
    </div>
</div>

<!-- второй -->
<img src="Увімкни для атмосфери - 2.png">

<!-- руки -->
<div class="block">
    <img src="Увімкни для атмосфери - 3.png">
    <div class="timer" id="timer"></div>
</div>

<!-- анкета -->
<div class="form">
    <h2>Анкета гостя</h2>

    <input placeholder="Ім'я">
    <input placeholder="Email">

    <select>
        <option>Чи будете?</option>
        <option>Так</option>
        <option>Ні</option>
    </select>

    <input placeholder="Скільки вас">

    <button>Відправити</button>
</div>

<!-- дресс код -->
<img src="Увімкни для атмосфери - 4.png">

<!-- группа -->
<div class="link">
    <h2>Загальна група</h2>
    <a href="#" target="_blank">Перейти</a>
</div>

<script>

const music = document.getElementById("music");

function startMusic() {
    music.currentTime = 11;
    music.play();
}

/* таймер */
const date = new Date("May 23, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = date - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor(diff / (1000*60*60));
    const m = Math.floor(diff / (1000*60));
    const s = Math.floor(diff / 1000);

    document.getElementById("timer").innerHTML =
        `${d} : ${h} : ${m} : ${s}`;
}, 1000);

</script>

</body>
</html>
