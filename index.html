<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artur & Viktoriia</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f6f6f6;
    font-family: 'Montserrat', sans-serif;
}

/* старт */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #f6f6f6;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 999;
}

#startScreen h1 {
    font-family: 'Great Vibes';
    font-size: 80px;
}

#startBtn {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: #3c5a7a;
    color: white;
    font-size: 16px;
}

/* секции */
.section {
    text-align: center;
    padding: 80px 20px;
}

.section img {
    width: 90%;
    border-radius: 20px;
}

/* текст */
h2 {
    font-family: 'Playfair Display';
    font-size: 28px;
}

/* таймер */
#countdown {
    font-size: 22px;
    margin-top: 20px;
}

/* кнопка */
#musicBtn {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 20px;
    background: #3c5a7a;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div id="startScreen">
    <h1>A & V</h1>
    <button id="startBtn">Відкрити</button>
</div>

<audio id="bgMusic" src="Два незнакомца - LuizA.mp3"></audio>

<div class="section">
    <img src="Увімкни для атмосфери - 1.png">
    <button id="musicBtn">Увімкнути атмосферу</button>
</div>

<div class="section">
    <h2>Чекаємо на вас!</h2>
</div>

<div class="section">
    <img src="Увімкни для атмосфери - 2.png">
</div>

<div class="section">
    <img src="Увімкни для атмосфери - 3.png">
    <div id="countdown"></div>
</div>

<script>
const music = document.getElementById("bgMusic");

document.getElementById("startBtn").onclick = () => {
    document.getElementById("startScreen").style.display = "none";
    music.currentTime = 11;
    music.play();
};

document.getElementById("musicBtn").onclick = () => {
    if (music.paused) music.play();
    else music.pause();
};

const date = new Date("May 23, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const d = date - now;

    document.getElementById("countdown").innerHTML =
    "До весілля залишилось<br>" +
    Math.floor(d / (1000*60*60*24)) + " днів";
}, 1000);
</script>

</body>
</html>
