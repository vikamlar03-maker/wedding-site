<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artur & Viktoriia</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #f4f4f4;
      color: #111;
      overflow-x: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* стартовый экран */
    #intro {
      position: fixed;
      inset: 0;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1.3s ease, visibility 1.3s ease;
    }

    #intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #introButton {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: #111;
      font-family: 'Great Vibes', cursive;
      font-size: 88px;
      line-height: 1;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    #introButton:active {
      transform: scale(0.98);
    }

    /* сайт скрыт до старта */
    #site {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    #site.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* мягкое проявление блоков */
    .reveal {
      opacity: 0;
      transform: translateY(42px);
      transition: opacity 1s ease, transform 1s ease;
      will-change: opacity, transform;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }

    .section {
      width: 100%;
      position: relative;
    }

    /* чуть более мягкий фон между блоками */
    .page-wrap {
      background: #efefef;
    }

    @media (max-width: 480px) {
      #introButton {
        font-size: 72px;
      }
    }
  </style>
</head>
<body>

  <!-- старт -->
  <div id="intro">
    <button id="introButton" type="button">A &amp; V</button>
  </div>

  <!-- сайт -->
  <main id="site" class="page-wrap">

    <section class="section reveal">
      <img src="Увімкни для атмосфери - 1.png" alt="Artur and Viktoriia cover">
    </section>

    <section class="section reveal">
      <img src="Увімкни для атмосфери - 2.png" alt="Invitation details">
    </section>

    <section class="section reveal">
      <img src="Увімкни для атмосфери - 3.png" alt="Wedding photo">
    </section>

  </main>

  <script>
    const intro = document.getElementById('intro');
    const introButton = document.getElementById('introButton');
    const site = document.getElementById('site');
    const revealBlocks = document.querySelectorAll('.reveal');

    function revealVisibleBlocks() {
      revealBlocks.forEach((block) => {
        const rect = block.getBoundingClientRect();
        if (rect.top < window.innerHeight - 90) {
          block.classList.add('show');
        }
      });
    }

    function startSite() {
      intro.classList.add('hidden');
      site.classList.add('visible');

      setTimeout(() => {
        revealVisibleBlocks();
      }, 250);
    }

    introButton.addEventListener('click', () => {
      startSite();
    });

    window.addEventListener('scroll', revealVisibleBlocks);
    window.addEventListener('load', revealVisibleBlocks);
  </script>

</body>
</html>
