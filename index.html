<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artur & Viktoriia</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f5f5f5;
    overflow-x: hidden;
}

/* --- старт экран --- /
#start {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: 1.5s;
}

#start h1 {
    font-family: 'Great Vibes';
    font-size: 80px;
}

/ --- фото --- /
img {
    width: 100%;
    display: block;
}

/ --- плавное появление --- /
.block {
    opacity: 0;
    transform: translateY(40px);
    transition: 1.2s;
}

.block.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- старт -->
<div id="start">
<h1>A & V</h1>
</div>

<!-- музыка -->
<audio id="music">
<source src="Два незнакомца – LuiZa.mp3">
</audio>

<!-- фото -->
<div class="block">
<img src="Увімкни для атмосфери - 1.png" onclick="startAll()">
</div>

<div class="block">
<img src="Увімкни для атмосфери - 2.png">
</div>

<div class="block">
<img src="Увімкни для атмосфери - 3.png">
</div>

<script>

/ старт экран /
setTimeout(()=>{
document.getElementById("start").style.opacity="0";
setTimeout(()=>{
document.getElementById("start").style.display="none";
},1500);
},2000);

/ музыка + клик по фото /
function startAll(){
let m = document.getElementById("music");
m.currentTime = 11;
m.play();
}

/ анимация при скролле */
let blocks = document.querySelectorAll(".block");

window.addEventListener("scroll", ()=>{
blocks.forEach(b=>{
let top = b.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
b.classList.add("show");
}
});
});
</script>

</body>
</html>
