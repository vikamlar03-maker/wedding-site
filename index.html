<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artur & Viktoriia</title>

<style>
body {
margin: 0;
font-family: 'Times New Roman', serif;
background: #EBEBEB;
overflow-x: hidden;
}

/* экран A&V */
.start-screen {
position: fixed;
width: 100%;
height: 100vh;
background: white;
display: flex;
align-items: center;
justify-content: center;
z-index: 9999;
transition: 1s;
}

.start-text {
font-size: 60px;
cursor: pointer;
opacity: 0;
animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
to { opacity: 1; }
}

/* фото */
.section {
opacity: 0;
transform: translateY(40px);
transition: 1.2s;
}

.section.show {
opacity: 1;
transform: translateY(0);
}

img {
width: 100%;
display: block;
}

/* таймер */
.timer-wrap {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
text-align: center;
color: black;
}

.timer-title {
font-size: 22px;
margin-bottom: 20px;
}

.timer-grid {
display: flex;
align-items: center;
justify-content: center;
gap: 15px;
}

.t-block {
text-align: center;
}

.t-num {
font-size: 30px;
}

.t-label {
font-size: 12px;
}

/* руки */
.hands {
position: relative;
}
</style>
</head>

<body>

<!-- старт -->
<div class="start-screen" id="start">
<div class="start-text" onclick="startSite()">A & V</div>
</div>

<audio id="music">
<source src="Два незнакомца - LuizA.mp3" type="audio/mpeg">
</audio>

<!-- фото 1 -->
<div class="section">
<img src="photo1.jpg.png">
</div>

<!-- фото 2 -->
<div class="section">
<img src="photo2.jpg.png">
</div>

<!-- фото 3 -->
<div class="section">
<img src="photo3.jpg.png">
</div>

<!-- руки + таймер -->
<div class="section hands">

<img src="IMG_7315.jpeg">

<div class="timer-wrap">
<div class="timer-title">
До дня, коли ми станемо сім'єю — залишилось
</div>

<div class="timer-grid">

<div class="t-block">
<div class="t-num" id="days">00</div>
<div class="t-label">днів</div>
</div>

<div class="t-block">
<div class="t-num" id="hours">00</div>
<div class="t-label">годин</div>
</div>

<div class="t-block">
<div class="t-num" id="minutes">00</div>
<div class="t-label">хвилин</div>
</div>

<div class="t-block">
<div class="t-num" id="seconds">00</div>
<div class="t-label">секунд</div>
</div>

</div>
</div>

</div>

<!-- дресс-код -->
<div class="section">
<img src="dress.png.jpg">
</div>

<script>

/* старт */
function startSite() {
document.getElementById("start").style.opacity = "0";
document.getElementById("music").currentTime = 11;
document.getElementById("music").play();

setTimeout(()=>{
document.getElementById("start").style.display="none";
},1000);
}

/* анимация */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
sections.forEach(sec => {
const top = sec.getBoundingClientRect().top;
if (top < window.innerHeight - 100) {
sec.classList.add('show');
}
});
});

/* таймер */
const weddingDate = new Date("May 23, 2026 11:00:00").getTime();

setInterval(() => {
const now = new Date().getTime();
const diff = weddingDate - now;

const d = Math.floor(diff / (1000 * 60 * 60 * 24));
const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
const m = Math.floor((diff / (1000 * 60)) % 60);
const s = Math.floor((diff / 1000) % 60);

document.getElementById("days").innerText = d;
document.getElementById("hours").innerText = h;
document.getElementById("minutes").innerText = m;
document.getElementById("seconds").innerText = s;

}, 1000);

</script>

</body>
</html>
