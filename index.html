<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artur & Viktoriia</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #f5f5f5;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
}

/* ===== СТАРТ ===== */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 1.5s ease;
}

#startText {
    font-family: 'Great Vibes';
    font-size: 70px;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* ===== ФОТО БЛОК ===== */
.section {
    opacity: 0;
    transform: translateY(50px);
    transition: all 1.2s ease;
}

.section.visible {
    opacity: 1;
    transform: translateY(0);
}

/* ===== ФОТО ===== */
.photo-block {
    position: relative;
    width: 100%;
}

.photo-block img {
    width: 100%;
    display: block;
}

/* ===== ТЕКСТ ПОВЕРХ ===== */
.overlay-text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 40%;
    transform: translateY(-50%);
    font-family: 'Great Vibes';
    font-size: 42px;
    color: black;
    opacity: 0;
    transition: all 1.5s ease;
}

.photo-block.visible .overlay-text {
    opacity: 1;
}

/* ===== ЖИВАЯ АНИМАЦИЯ ===== */
@keyframes float {
    0% { transform: translateY(-50%) translateY(0); }
    50% { transform: translateY(-50%) translateY(10px); }
    100% { transform: translateY(-50%) translateY(0); }
}

.overlay-text {
    animation: float 6s infinite ease-in-out;
}

/* ===== ТАЙМЕР ===== */
.timer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 26px;
    font-family: 'Montserrat';
}

/* ===== АНКЕТА ===== */
.form-block {
    padding: 40px 20px;
    text-align: center;
}

.form-block h2 {
    font-family: 'Great Vibes';
    font-size: 36px;
}

form input, form select {
    width: 80%;
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

form button {
    padding: 12px 25px;
    border: none;
    background: #2f4f73;
    color: white;
    border-radius: 20px;
}

/* ===== TELEGRAM ===== */
.telegram {
    text-align: center;
    padding: 40px;
    font-family: 'Great Vibes';
    font-size: 28px;
}

.telegram a {
    display: inline-block;
    margin-top: 15px;
    font-family: 'Montserrat';
    font-size: 18px;
}

</style>
</head>

<body>

<!-- 💫 СТАРТ -->
<div id="startScreen">
    <div id="startText">A & V</div>
</div>

<!-- 🎵 МУЗЫКА -->
<audio id="music" src="music.mp3"></audio>

<!-- 📸 1 -->
<div class="section photo-block">
    <img src="photo1.jpg">
    <div class="overlay-text">Artur & Viktoriia</div>
</div>

<!-- 📸 2 -->
<div class="section photo-block">
    <img src="photo2.jpg">
    <div class="overlay-text">Чекаємо на вас</div>
</div>

<!-- 📸 3 -->
<div class="section photo-block">
    <img src="photo3.jpg">
    <div class="overlay-text">З радістю запрошуємо</div>
</div>

<!-- 📸 РУКИ + ТАЙМЕР -->
<div class="section photo-block">
    <img src="hands.jpg">

    <div class="overlay-text">Залишилось</div>

    <div class="timer" id="timer"></div>
</div>

<!-- 📝 АНКЕТА -->
<div class="form-block">
    <h2>Анкета гостя</h2>

    <form>
        <input type="text" placeholder="Ім'я"><br>
        <input type="email" placeholder="Email"><br>

        <select>
            <option>Чи будете?</option>
            <option>Так</option>
            <option>Ні</option>
        </select><br>

        <input type="number" placeholder="Скільки вас"><br>

        <button type="submit">Відправити</button>
    </form>
</div>

<!-- 💬 TELEGRAM -->
<div class="telegram">
    Загальна група<br>
    <a href="https://t.me/+s59jP9LBAQQzNmE6" target="_blank">
        Перейти в Telegram
    </a>
</div>

<script>

/* ===== СТАРТ ===== */
const start = document.getElementById("startScreen");
const text = document.getElementById("startText");
const music = document.getElementById("music");

text.addEventListener("click", () => {
    start.style.opacity = "0";

    setTimeout(() => {
        start.style.display = "none";
    }, 1500);

    music.currentTime = 11;
    music.play();
});

/* ===== АНИМАЦИЯ СКРОЛЛА ===== */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            sec.classList.add('visible');
        }
    });
});

/* ===== ТАЙМЕР ===== */
const weddingDate = new Date("May 23, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);

    document.getElementById("timer").innerHTML =
        `${d} : ${h} : ${m}`;
}, 1000);

</script>

</body>
</html>
