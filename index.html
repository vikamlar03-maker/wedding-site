<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artur & Viktoriia</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f5f5f5;
    overflow-x: hidden;
}

/* --- стартовый экран --- */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
    transition: opacity 1.5s ease;
}

#startScreen h1 {
    font-family: 'Great Vibes';
    font-size: 70px;
    margin: 0;
}

#startBtn {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    background: #2f4f73;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* --- секции --- */
.section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
    opacity: 0;
    transform: translateY(50px);
    transition: all 1s ease;
}

.section.visible {
    opacity: 1;
    transform: translateY(0);
}

img {
    max-width: 90%;
    border-radius: 20px;
}

/* --- таймер --- */
#countdown {
    font-size: 22px;
    margin-top: 20px;
}

/* --- кнопка музыки --- */
#musicBtn {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #2f4f73;
    color: white;
    cursor: pointer;
}

/* --- форма --- */
form input, form button {
    margin: 10px;
    padding: 10px;
    width: 250px;
}

form button {
    background: #2f4f73;
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🌿 старт -->
<div id="startScreen">
    <h1>A & V</h1>
    <button id="startBtn">Натисніть</button>
</div>

<!-- 🎵 музыка -->
<audio id="bgMusic" src="music.mp3"></audio>

<!-- 📸 1 экран -->
<div class="section">
    <img src="photo1.jpg">
    <button id="musicBtn">Увімкнути атмосферу</button>
</div>

<!-- 💌 приглашение -->
<div class="section">
    <h2>Чекаємо на вас!</h2>
    <p>З радістю запрошуємо вас розділити з нами день нашого весілля</p>
</div>

<!-- ❤️ фото -->
<div class="section">
    <img src="photo2.jpg">
</div>

<!-- ⏳ таймер -->
<div class="section">
    <img src="hands.jpg">
    <div id="countdown"></div>
</div>

<!-- 📝 анкета -->
<div class="section">
    <h2>Анкета гостя</h2>

    <form>
        <input type="text" placeholder="Ваше ім'я" required><br>
        <input type="email" placeholder="Email" required><br>

        <select>
            <option>Чи будете присутні?</option>
            <option>Так</option>
            <option>Ні</option>
        </select><br>

        <input type="number" placeholder="Скільки вас буде"><br>

        <button type="submit">Відправити</button>
    </form>
</div>

<script>

/* --- плавное появление блоков --- */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            sec.classList.add('visible');
        }
    });
});

/* --- старт экран --- */
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const music = document.getElementById("bgMusic");

startBtn.addEventListener("click", () => {
    startScreen.style.opacity = "0";

    setTimeout(() => {
        startScreen.style.display = "none";
    }, 1500);

    music.currentTime = 11;
    music.play();
});

/* --- кнопка музыки --- */
const btn = document.getElementById("musicBtn");
let isPlaying = true;

btn.addEventListener("click", () => {
    if (isPlaying) {
        music.pause();
        btn.innerText = "Увімкнути атмосферу";
    } else {
        music.play();
        btn.innerText = "Зупинити музику";
    }
    isPlaying = !isPlaying;
});

/* --- таймер --- */
const weddingDate = new Date("May 23, 2026 11:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        `До нашого весілля залишилось<br>
        <b>${d}</b> днів 
        <b>${h}</b> годин 
        <b>${m}</b> хвилин 
        <b>${s}</b> секунд`;
}, 1000);

</script>

</body>
</html>
